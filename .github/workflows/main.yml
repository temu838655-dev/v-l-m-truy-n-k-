name: Tu Dong Xuat APK Vo Lam Chuan 2026

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Chuan bi thu muc Web
      run: |
        mkdir www
        cp index.html www/index.html

    - name: Cai dat Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        npx cap init "Vo Lam Mini" "com.volam.mini2026" --web-dir=www
        npm install @capacitor/android
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Xay dung file APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Luu file APK de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: VoLamAPK-Chuan
        path: android/app/build/outputs/apk/debug/app-debug.apk
