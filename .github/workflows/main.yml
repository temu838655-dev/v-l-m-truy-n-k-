name: Tu Dong Xuat APK Vo Lam Giai Phap Cuoi

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # BƯỚC ĐỘT PHÁ: Tự động tải code trực tiếp từ link Raw, chấp mọi loại lỗi file trong kho
    - name: Cuu nguy index.html bang cach tai truc tiep
      run: |
        mkdir www
        echo "=== TIẾN HÀNH TẢI CODE GAME TRỰC TIẾP ==="
        curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/index.html" -o www/index.html
        
        # Nếu tải từ nhánh hiện tại lỗi, tự động ép tải từ nhánh main
        if [ ! -s www/index.html ] || grep -q "404: Not Found" www/index.html; then
          echo "Thử tải lại từ nhánh mặc định..."
          curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/index.html" -o www/index.html
        fi
        
        # Kiểm tra cuối cùng xem file có ruột không
        if [ ! -s www/index.html ] || grep -q "404: Not Found" www/index.html; then
          echo "❌ Thất bại! File index.html chưa tồn tại hoặc kho của bạn vẫn đang ở chế độ Private."
          exit 1
        else
          echo "✅ ĐÃ ÉP TẢI FILE INDEX.HTML THÀNH CÔNG!"
        fi

    - name: Cai dat Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        npx cap init "Vo Lam Mini" "com.volam.mini2026" --web-dir=www
        npm install @capacitor/android
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Xay dung file APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Luu file APK de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: VoLamAPK-Chuan
        path: android/app/build/outputs/apk/debug/app-debug.apk
