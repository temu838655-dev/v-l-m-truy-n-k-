name: Tu Dong Xuat APK Vo Lam Chuan 2026

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # BƯỚC THAY THẾ: Tự động lùng sục tìm bằng được file index.html bất kể bạn để ở đâu
    - name: Chuan bi thu muc Web Thong Minh
      run: |
        mkdir www
        echo "=== ĐANG TÌM FILE INDEX.HTML ==="
        REAL_PATH=$(find . -iname "index.html" -not -path "*/www/*" | head -n 1)
        
        if [ -z "$REAL_PATH" ]; then
          echo "❌ LỖI NGHIÊM TRỌNG: Không tìm thấy bất kỳ file nào tên là index.html trong kho của bạn!"
          echo "Hãy chắc chắn rằng bạn không đặt tên sai thành index.html.txt hoặc viết sai chính tả."
          exit 1
        fi
        
        echo "✅ Đã tìm thấy file tại đường dẫn: $REAL_PATH"
        cp "$REAL_PATH" www/index.html

    - name: Cai dat Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        npx cap init "Vo Lam Mini" "com.volam.mini2026" --web-dir=www
        npm install @capacitor/android
        npx cap add android
        npx cap sync

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Xay dung file APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Luu file APK de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: VoLamAPK-Chuan
        path: android/app/build/outputs/apk/debug/app-debug.apk
